<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <meta name="keywords" content="드라이브 코스 추천, 서울 근교 드라이브, 해안도로 드라이브, 단풍 드라이브, 벚꽃 드라이브, 야경 드라이브">
  <link rel="canonical" href="https://dt-1js.pages.dev/course/">

  <meta property="og:type" content="website">
  <meta property="og:title" content="드라이브 코스 가이드 | DT Club">
  <meta property="og:description" content="전국 드라이브 코스 큐레이션. 계절별·테마별 추천.">
  <meta property="og:image" content="https://dt-1js.pages.dev/og-image.png">
  <meta property="og:url" content="https://dt-1js.pages.dev/course/">
  <meta property="og:site_name" content="DT Club">
  <meta property="og:locale" content="ko_KR">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="드라이브 코스 가이드 | DT Club">
  <meta name="twitter:description" content="전국 드라이브 코스 큐레이션.">

  <meta name="naver-site-verification" content="491f12b03fc8798c6fb79569414942a9867e0a9a">
  <meta name="google-site-verification" content="_9nEl6JAYWoP4H7cSfpx6uKZmAWCBucyVg9eNT_gD5w">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ItemList",
    "name": "드라이브 코스 가이드",
    "description": "전국 드라이브 코스 큐레이션 — 계절별, 테마별 추천",
    "url": "https://dt-1js.pages.dev/course/",
    "author": { "@type": "Organization", "name": "DT Club", "url": "https://dt-1js.pages.dev" }
  }
  </script>

  <link rel="icon" href="../icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <a href="/" class="back-btn">← 홈</a>
    <h1>🗺️ 드라이브 코스</h1>
    <button id="themeToggle" onclick="toggleTheme()" class="theme-btn">🌙</button>
  </header>

  <div class="top-bar">
    <div class="filter-switches">
      <div class="filter-switch-group">
        <span class="filter-switch-label">🌸 계절</span>
        <label class="f-switch"><input type="checkbox" data-tag="봄"><span class="f-track"></span><span class="f-text">봄</span></label>
        <label class="f-switch"><input type="checkbox" data-tag="여름"><span class="f-track"></span><span class="f-text">여름</span></label>
        <label class="f-switch"><input type="checkbox" data-tag="가을"><span class="f-track"></span><span class="f-text">가을</span></label>
        <label class="f-switch"><input type="checkbox" data-tag="겨울"><span class="f-track"></span><span class="f-text">겨울</span></label>
      </div>
      <div class="filter-switch-group">
        <span class="filter-switch-label">✨ 테마</span>
        <label class="f-switch"><input type="checkbox" data-tag="야경"><span class="f-track"></span><span class="f-text">야경</span></label>
        <label class="f-switch"><input type="checkbox" data-tag="해안도로"><span class="f-track"></span><span class="f-text">해안도로</span></label>
        <label class="f-switch"><input type="checkbox" data-tag="산악"><span class="f-track"></span><span class="f-text">산악</span></label>
        <label class="f-switch"><input type="checkbox" data-tag="카페로드"><span class="f-track"></span><span class="f-text">카페로드</span></label>
        <label class="f-switch"><input type="checkbox" data-tag="드라이브"><span class="f-track"></span><span class="f-text">드라이브</span></label>
      </div>
    </div>
    <button class="btn-write" id="writeBtn" style="display:none" onclick="openWriteModal()">✏️ 글 작성</button>
  </div>

  <div class="container">
    <div id="courseList" class="post-grid"></div>
    <div id="loadMoreWrap" style="display:none;text-align:center;padding:16px">
      <button class="btn-more" onclick="loadMore()">더 보기</button>
    </div>
  </div>

  <!-- 글 작성/수정 모달 -->
  <div class="modal-overlay" id="writeModal" style="display:none" onclick="if(event.target===this)closeWriteModal()">
    <div class="modal-box modal-write">
      <div class="write-header">
        <h3 id="writeModalTitle">드라이브 코스 작성</h3>
        <button class="write-close" onclick="closeWriteModal()">✕</button>
      </div>

      <!-- 이미지 업로드 -->
      <div class="img-section">
        <div class="img-upload-area" id="imgUploadArea" onclick="document.getElementById('imgInput').click()">
          <div class="img-upload-placeholder" id="imgPlaceholder">
            <span class="img-upload-icon">📷</span>
            <span>사진 추가 (최대 5장)</span>
          </div>
        </div>
        <div class="img-preview-list" id="imgPreviewList"></div>
        <input type="file" id="imgInput" accept="image/*" multiple style="display:none" onchange="handleImageSelect(this)">
      </div>

      <!-- 제목 -->
      <input type="text" class="write-input" id="wTitle" placeholder="코스 제목을 입력하세요" maxlength="60">

      <!-- 내용 -->
      <textarea class="write-textarea" id="wContent" placeholder="드라이브 코스를 소개해주세요. 출발지, 경유 포인트, 맛집, 꿀팁 등을 자유롭게 적어주세요." rows="6"></textarea>

      <!-- 계절 태그 -->
      <div class="chip-section">
        <div class="chip-label">🌸 계절</div>
        <div class="switch-group" id="wSeasons">
          <label class="switch-item"><input type="checkbox" data-val="봄"><span class="switch-track"></span><span class="switch-text">봄</span></label>
          <label class="switch-item"><input type="checkbox" data-val="여름"><span class="switch-track"></span><span class="switch-text">여름</span></label>
          <label class="switch-item"><input type="checkbox" data-val="가을"><span class="switch-track"></span><span class="switch-text">가을</span></label>
          <label class="switch-item"><input type="checkbox" data-val="겨울"><span class="switch-track"></span><span class="switch-text">겨울</span></label>
        </div>
      </div>

      <!-- 테마 태그 -->
      <div class="chip-section">
        <div class="chip-label">✨ 테마</div>
        <div class="switch-group" id="wThemes">
          <label class="switch-item"><input type="checkbox" data-val="야경"><span class="switch-track"></span><span class="switch-text">야경</span></label>
          <label class="switch-item"><input type="checkbox" data-val="해안도로"><span class="switch-track"></span><span class="switch-text">해안도로</span></label>
          <label class="switch-item"><input type="checkbox" data-val="산악"><span class="switch-track"></span><span class="switch-text">산악</span></label>
          <label class="switch-item"><input type="checkbox" data-val="카페로드"><span class="switch-track"></span><span class="switch-text">카페로드</span></label>
          <label class="switch-item"><input type="checkbox" data-val="드라이브"><span class="switch-track"></span><span class="switch-text">드라이브</span></label>
        </div>
      </div>

      <!-- 선택 정보 -->
      <details class="optional-details">
        <summary>추가 정보 (선택)</summary>
        <div class="optional-fields">
          <input type="number" class="write-input-sm" id="wDistance" placeholder="거리 (km)">
          <input type="text" class="write-input-sm" id="wDuration" placeholder="소요시간 (예: 2시간 30분)">
          <input type="text" class="write-input" id="wSpots" placeholder="주요 경유지 (쉼표로 구분)">
        </div>
      </details>

      <div class="modal-actions">
        <button class="btn-submit" id="submitBtn" onclick="submitPost()">등록하기</button>
        <button class="btn-cancel" onclick="closeWriteModal()">취소</button>
      </div>
    </div>
  </div>

  <!-- 글 상세 모달 -->
  <div class="modal-overlay" id="detailModal" style="display:none" onclick="if(event.target===this)closeDetailModal()">
    <div class="modal-box modal-detail">
      <div id="detailContent"></div>
      <div class="detail-actions" id="detailActions"></div>
      <button class="btn-close" onclick="closeDetailModal()">닫기</button>
    </div>
  </div>

  <script src="../firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
