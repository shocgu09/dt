<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>AI 트렌드 - DT Club</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="../icon-192.png">
</head>
<body>
  <div class="container">
    <header class="header">
      <a href="/" class="back-btn">← 홈</a>
      <h1>🤖 AI 트렌드</h1>
      <button id="themeToggle" onclick="toggleTheme()" class="theme-btn">🌙</button>
    </header>

    <div class="filter-bar">
      <button class="filter-btn active" data-cat="all" onclick="filterCategory('all')">전체</button>
      <button class="filter-btn" data-cat="X" onclick="filterCategory('X')">𝕏</button>
      <button class="filter-btn" data-cat="뉴스레터" onclick="filterCategory('뉴스레터')">📰 뉴스레터</button>
      <button class="filter-btn" data-cat="유튜브" onclick="filterCategory('유튜브')">▶️ 유튜브</button>
      <input type="text" class="search-input" id="searchInput" placeholder="검색..." oninput="renderLinks()">
    </div>

    <div id="linkList" class="link-list">
      <div class="loading">로딩 중...</div>
    </div>

    <!-- 관리자 전용: 링크 추가 -->
    <div id="adminPanel" class="admin-panel" style="display:none">
      <h3>➕ 링크 추가</h3>
      <div class="add-form">
        <select id="addCategory">
          <option value="X">𝕏 X</option>
          <option value="뉴스레터">📰 뉴스레터</option>
          <option value="유튜브">▶️ 유튜브</option>
        </select>
        <input type="text" id="addName" placeholder="이름">
        <input type="url" id="addUrl" placeholder="URL">
        <input type="text" id="addDesc" placeholder="설명 (선택)">
        <input type="text" id="addIcon" placeholder="아이콘 이모지 (선택)" maxlength="4">
        <button class="btn-add" onclick="addTrendLink()">추가</button>
      </div>
    </div>
  </div>

  <script src="../firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
