<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>AI 트렌드 - DT Club</title>
  <meta name="description" content="ChatGPT, Claude, 자율주행 등 최신 AI 트렌드를 유튜브 영상, 뉴스레터, X(트위터)로 한곳에서. DT Club AI 트렌드 큐레이션.">
  <meta property="og:type" content="website" />
  <meta property="og:title" content="AI 트렌드 - DT Club" />
  <meta property="og:description" content="ChatGPT, Claude, 자율주행 등 최신 AI 트렌드를 유튜브 영상, 뉴스레터, X(트위터)로 한곳에서." />
  <meta property="og:image" content="https://dt-1js.pages.dev/og-image.png" />
  <meta property="og:url" content="https://dt-1js.pages.dev/ai-trend/" />
  <meta property="og:site_name" content="DT Club" />
  <meta property="og:locale" content="ko_KR" />
  <link rel="canonical" href="https://dt-1js.pages.dev/ai-trend/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="../icon-192.png">
</head>
<body>
  <div class="container">
    <header class="header">
      <a href="/" class="back-btn">← 홈</a>
      <h1>🤖 AI 트렌드</h1>
      <button id="themeToggle" onclick="toggleTheme()" class="theme-btn">🌙</button>
    </header>

    <!-- 탭 -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="briefing" onclick="switchTab('briefing')">🤖 브리핑</button>
      <button class="tab-btn" data-tab="feed" onclick="switchTab('feed')">📡 피드</button>
      <button class="tab-btn" data-tab="links" onclick="switchTab('links')">🔗 링크</button>
      <button class="tab-btn" data-tab="admin" onclick="switchTab('admin')" id="tabAdmin" style="display:none">⚙️ 관리</button>
    </div>

    <!-- 소개 -->
    <div class="intro-card">
      <p>AI 소식은 빠르지만, 중요한 건 <strong>많이 아는 것</strong>이 아니라 <strong>나에게 필요한지를 판단하는 것</strong>입니다.</p>
      <p>놓치지 않되, 휘둘리지는 마세요.</p>
      <p class="intro-schedule">🤖 매주 수요일, AI 에이전트가 일주일치 AI 소식을 브리핑해 드립니다.</p>
    </div>

    <!-- 브리핑 탭 -->
    <div class="tab-content active" id="tab-briefing">
      <div id="briefingSection"></div>
    </div>

    <!-- 피드 탭 -->
    <div class="tab-content" id="tab-feed">
      <div id="feedContent">
        <div class="loading">피드 로딩 중...</div>
      </div>
    </div>

    <!-- 링크 탭 -->
    <div class="tab-content" id="tab-links">
      <div class="filter-bar">
        <button class="filter-btn active" data-cat="all" onclick="filterCategory('all')">전체</button>
        <button class="filter-btn" data-cat="X" onclick="filterCategory('X')">𝕏</button>
        <button class="filter-btn" data-cat="뉴스레터" onclick="filterCategory('뉴스레터')">📰</button>
        <button class="filter-btn" data-cat="유튜브" onclick="filterCategory('유튜브')">▶️</button>
        <input type="text" class="search-input" id="searchInput" placeholder="검색..." oninput="renderLinks()">
      </div>
      <div id="linkList" class="link-list"></div>
    </div>

    <!-- 관리 탭 (관리자만) -->
    <div class="tab-content" id="tab-admin">
      <!-- AI 브리핑 작성 -->
      <div class="admin-section" id="briefingWriteSection">
        <h3>📋 AI 브리핑 작성</h3>
        <div class="briefing-form">
          <input type="date" id="briefingDate" class="briefing-input">
          <input type="text" id="briefingTitle" class="briefing-input" placeholder="브리핑 제목 (예: 2026.04.01 AI 트렌드 브리핑)">
          <textarea id="briefingBody" class="briefing-textarea" placeholder="오늘의 AI 트렌드 브리핑 내용을 입력하세요...&#10;&#10;예시:&#10;🔥 오늘의 주요 소식&#10;① Claude 4 출시 — Anthropic이 ...&#10;② OpenAI 발표 — ..."></textarea>
          <button id="briefingSubmitBtn" class="btn-briefing-submit" onclick="submitBriefing()">📋 브리핑 게시</button>
        </div>
        <div id="briefingStatus" style="margin-top:8px;font-size:.85rem"></div>
      </div>
      <div class="admin-section">
        <h3>➕ 링크 추가</h3>
        <div class="add-form">
          <select id="addCategory">
            <option value="X">𝕏 X</option>
            <option value="뉴스레터">📰 뉴스레터</option>
            <option value="유튜브">▶️ 유튜브</option>
          </select>
          <input type="text" id="addName" placeholder="이름">
          <input type="text" id="addUrl" placeholder="URL">

          <input type="text" id="addDesc" placeholder="설명 (선택)">
          <input type="text" id="addRss" placeholder="RSS URL (뉴스레터만, 선택)" style="display:none">
          <p id="rssHint" style="display:none;font-size:.75rem;color:var(--text3);margin:0">💡 RSS URL을 비워두면 자동으로 URL/feed를 시도합니다. 안 되면 RSS URL을 직접 입력하세요.</p>
          <button class="btn-add" onclick="addTrendLink()">추가</button>
        </div>
      </div>
      <div class="admin-section">
        <h3>📋 등록된 링크</h3>
        <div id="adminLinkList" class="link-list"></div>
      </div>
    </div>
  </div>

  <script src="../firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
