<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>DT 스팟 - DT Club</title>
  <meta name="description" content="DT Club 드라이브 스팟 — 맛집, 카페, 명소, 드라이브 코스를 지도에서 확인하세요.">
  <meta property="og:title" content="DT 스팟 - DT Club">
  <meta property="og:description" content="DT Club 드라이브 스팟 — 맛집, 카페, 명소, 드라이브 코스를 지도에서 확인하세요.">
  <meta property="og:image" content="https://dt-1js.pages.dev/og-image.png">
  <meta property="og:url" content="https://dt-1js.pages.dev/spots/">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="../icon-192.png">
</head>
<body>

  <!-- 헤더 -->
  <div class="header">
    <a href="/" class="back-btn">← 홈</a>
    <h1>📍 DT 스팟</h1>
    <button id="themeToggle" onclick="toggleTheme()" class="theme-btn">🌙</button>
  </div>

  <!-- 카테고리 필터 -->
  <div class="filter-bar">
    <button class="filter-btn active" data-cat="all" onclick="filterCategory('all')">전체</button>
    <button class="filter-btn" data-cat="맛집" onclick="filterCategory('맛집')">🍽️ 맛집</button>
    <button class="filter-btn" data-cat="카페" onclick="filterCategory('카페')">☕ 카페</button>
    <button class="filter-btn" data-cat="명소" onclick="filterCategory('명소')">🏛️ 명소</button>
    <button class="filter-btn" data-cat="코스" onclick="filterCategory('코스')">🛣️ 코스</button>
    <button class="filter-btn" data-cat="기타" onclick="filterCategory('기타')">📍 기타</button>
  </div>

  <!-- 검색 -->
  <div class="search-bar">
    <input type="text" id="spotSearchBar" class="search-bar-input" placeholder="🔍 장소명, 주소, 메모 검색" oninput="onSearchInput(this.value)">
    <button class="search-bar-clear" id="searchClearBtn" onclick="clearSearch()" style="display:none">✕</button>
  </div>

  <!-- 지도 -->
  <div class="map-wrap">
    <div id="map"></div>
    <div class="map-overlay-btns">
      <button class="map-btn" onclick="goToMyLocation()">📍 내 위치</button>
    </div>
  </div>

  <!-- 추가 버튼 (회원 전용) -->
  <div class="fab-container" id="fabContainer" style="display:none">
    <button class="fab-btn secondary" onclick="openAddSpotModal()">📍 장소 추가</button>
    <button class="fab-btn" onclick="openAddCourseModal()">🛣️ 코스 추가</button>
  </div>

  <!-- 리스트 헤더 -->
  <div class="list-header">
    <span id="listCount">로딩 중...</span>
    <span id="authStatus" style="color:var(--text3);font-size:.75rem"></span>
  </div>

  <!-- 스팟 리스트 -->
  <div id="spotList" class="spot-list">
    <div class="empty">지도를 불러오는 중...</div>
  </div>

  <!-- ===== 상세 모달 ===== -->
  <div id="detailModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('detailModal')">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title" id="detailTitle"></span>
        <button class="modal-close" onclick="closeModal('detailModal')">✕</button>
      </div>
      <div id="detailBody"></div>
    </div>
  </div>

  <!-- ===== 장소 추가 모달 ===== -->
  <div id="addSpotModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('addSpotModal')">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title">📍 장소 추가</span>
        <button class="modal-close" onclick="closeModal('addSpotModal')">✕</button>
      </div>
      <div class="form-group">
        <label class="form-label">카테고리</label>
        <select id="spotCategory" class="form-select form-input">
          <option value="맛집">🍽️ 맛집</option>
          <option value="카페">☕ 카페</option>
          <option value="명소">🏛️ 명소</option>
          <option value="기타">📍 기타</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">장소 검색</label>
        <div class="form-row">
          <input type="text" id="spotSearchInput" class="form-input" placeholder="장소명 또는 주소 입력"
            onkeydown="if(event.key==='Enter')searchSpotPlace()">
          <button onclick="searchSpotPlace()" class="map-btn" style="white-space:nowrap;padding:10px 14px">검색</button>
        </div>
        <div id="spotSearchResults" class="search-results" style="display:none"></div>
      </div>
      <div class="form-group">
        <label class="form-label">장소명 <span style="color:var(--accent)">*</span></label>
        <input type="text" id="spotName" class="form-input" placeholder="장소명">
      </div>
      <div class="form-group">
        <label class="form-label">주소</label>
        <input type="text" id="spotAddress" class="form-input" placeholder="검색하면 자동 입력됩니다" readonly>
        <input type="hidden" id="spotLat">
        <input type="hidden" id="spotLng">
      </div>
      <div class="form-group">
        <label class="form-label">메모</label>
        <textarea id="spotMemo" class="form-textarea" placeholder="방문 소감, 추천 메뉴, 주의사항 등 자유롭게 작성하세요"></textarea>
      </div>
      <div id="spotSaveMsg" style="font-size:.8rem;color:var(--accent);margin-bottom:8px;display:none"></div>
      <button class="btn-primary" id="spotSaveBtn" onclick="saveSpot()">저장</button>
    </div>
  </div>

  <!-- ===== 코스 추가 모달 ===== -->
  <div id="addCourseModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('addCourseModal')">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title">🛣️ 드라이브 코스 추가</span>
        <button class="modal-close" onclick="closeModal('addCourseModal')">✕</button>
      </div>
      <div class="form-group">
        <label class="form-label">코스명 <span style="color:var(--accent)">*</span></label>
        <input type="text" id="courseName" class="form-input" placeholder="예: 남해 드라이브 코스">
      </div>
      <div class="form-group">
        <label class="form-label">코스 소개</label>
        <textarea id="courseDesc" class="form-textarea" placeholder="추천 계절, 소요 시간, 주의사항 등"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">경유지 <span style="color:var(--accent)">*</span> <span style="font-weight:400;color:var(--text3)">(최소 2개)</span></label>
        <div id="waypointList" class="waypoint-list"></div>
        <button class="add-waypoint-btn" onclick="addWaypointField()">+ 경유지 추가</button>
      </div>
      <div id="courseSaveMsg" style="font-size:.8rem;color:var(--accent);margin-bottom:8px;display:none"></div>
      <button class="btn-primary" id="courseSaveBtn" onclick="saveCourse()">저장</button>
    </div>
  </div>

  <script src="../firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=4e6bf0a48d4d8a637a18a4ba1d82deaf&libraries=services&autoload=false"></script>
  <script src="app.js"></script>
</body>
</html>
