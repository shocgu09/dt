<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- AIRBAG - Seated person with airbag circle -->
  <g stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Head -->
    <circle cx="38" cy="14" r="5"/>
    <!-- Body/torso leaning slightly forward -->
    <path d="M38 19v12"/>
    <!-- Seat (chair back) -->
    <path d="M44 16v30"/>
    <!-- Legs on seat -->
    <path d="M38 31l-4 10h-8"/>
    <path d="M34 41v8"/>
    <!-- Seat bottom -->
    <path d="M26 41h18"/>
    <!-- Airbag (inflated circle in front of person) -->
    <circle cx="24" cy="24" r="9"/>
    <!-- Arms reaching toward airbag -->
    <path d="M36 24l-3 0"/>
  </g>
</svg>