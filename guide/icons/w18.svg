<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- EV BATTERY - Battery outline with lightning bolt -->
  <g stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Battery body -->
    <rect x="10" y="20" width="40" height="24" rx="3"/>
    <!-- Battery terminal (positive bump) -->
    <path d="M50 28h4v8h-4"/>
    <!-- Lightning bolt inside battery -->
    <path d="M34 24l-8 10h8l-8 10"/>
    <!-- Small charge level lines -->
    <line x1="14" y1="26" x2="14" y2="38"/>
  </g>
</svg>