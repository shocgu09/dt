<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- DPF - Diesel particulate filter with exhaust flow -->
  <g stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Filter housing (rectangle) -->
    <rect x="16" y="18" width="24" height="28" rx="2"/>
    <!-- Filter dots/channels inside -->
    <circle cx="24" cy="26" r="1.5" fill="#fbbf24" stroke="none"/>
    <circle cx="32" cy="26" r="1.5" fill="#fbbf24" stroke="none"/>
    <circle cx="24" cy="32" r="1.5" fill="#fbbf24" stroke="none"/>
    <circle cx="32" cy="32" r="1.5" fill="#fbbf24" stroke="none"/>
    <circle cx="24" cy="38" r="1.5" fill="#fbbf24" stroke="none"/>
    <circle cx="32" cy="38" r="1.5" fill="#fbbf24" stroke="none"/>
    <!-- Exhaust flow arrows out -->
    <path d="M40 26h8"/>
    <path d="M46 23l4 3-4 3"/>
    <path d="M40 38h8"/>
    <path d="M46 35l4 3-4 3"/>
