<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- BRAKE - Circle with (!) brake symbol -->
  <g stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer circle (brake disc) -->
    <circle cx="32" cy="32" r="22"/>
    <!-- Left parenthesis (brake pad) -->
    <path d="M18 20c-4 7-4 17 0 24"/>
    <!-- Right parenthesis (brake pad) -->
    <path d="M46 20c4 7 4 17 0 24"/>
    <!-- Exclamation mark -->
    <line x1="32" y1="22" x2="32" y2="35"/>
    <circle cx="32" cy="40" r="1.5" fill="#ef4444" stroke="none"/>
  </g>
</svg>