<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- POWER STEERING / EPS - Steering wheel with "!" -->
  <g stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Steering wheel outer ring -->
    <circle cx="28" cy="32" r="18"/>
    <!-- Center hub -->
    <circle cx="28" cy="32" r="4"/>
    <!-- Spokes (3 spokes) -->
    <line x1="28" y1="28" x2="28" y2="18"/>
    <line x1="24" y1="34" x2="14" y2="40"/>
    <line x1="32" y1="34" x2="42" y2="40"/>
    <!-- Exclamation mark to the right -->
    <line x1="54" y1="18" x2="54" y2="36"/>
    <circle cx="54" cy="42" r="2" fill="#ef4444" stroke="none"/>
  </g>
</svg>