<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- PARKING BRAKE - P inside circle with parentheses -->
  <g stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main circle -->
    <circle cx="32" cy="32" r="18"/>
    <!-- Left parenthesis (brake pad) -->
    <path d="M10 18c-5 8-5 20 0 28"/>
    <!-- Right parenthesis (brake pad) -->
    <path d="M54 18c5 8 5 20 0 28"/>
    <!-- P letter -->
    <text x="32" y="39" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="24" fill="#60a5fa" stroke="none">P</text>
  </g>
</svg>