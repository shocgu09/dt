<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- ESC/VDC - Car with S-shaped skid marks -->
  <g stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Car body (rear view simplified) -->
    <path d="M18 28h28l-3-8H21z"/>
    <rect x="14" y="28" width="36" height="12" rx="2"/>
    <!-- Wheels -->
    <rect x="16" y="38" width="8" height="5" rx="2"/>
    <rect x="40" y="38" width="8" height="5" rx="2"/>
    <!-- S-shaped skid marks below -->
    <path d="M22 48c4-2 4 4 8 2"/>
    <path d="M34 48c4-2 4 4 8 2"/>
    <!-- Second set of skid marks -->
    <path d="M22 53c4-2 4 4 8 2"/>
    <path d="M34 53c4-2 4 4 8 2"/>
  </g>
</svg>