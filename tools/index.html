<body>
  <header class="header">
    <a href="/" class="back-btn">← 홈</a>
    <h1>🔧 유지비 계산</h1>
    <button id="themeToggle" onclick="toggleTheme()" class="theme-btn">🌙</button>
  </header>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="maintain">🔧 유지비</button>
  </div>

  <div class="container">
    <!-- 유지비 계산기 -->
    <div id="tab-maintain" class="tab-content active">
      <div class="calc-card">
        <h2>차량 유지비 계산기</h2>
        <p class="calc-desc">유종, 연비, 주행거리를 입력하면 월/연간 유지비를 계산합니다.</p>

        <div class="form-group">
          <label>유종</label>
          <div class="radio-group" id="fuelType">
            <button class="radio-btn active" data-value="gasoline">휘발유</button>
            <button class="radio-btn" data-value="premium">고급휘발유</button>
            <button class="radio-btn" data-value="diesel">경유</button>
            <button class="radio-btn" data-value="lpg">LPG</button>
            <button class="radio-btn" data-value="electric">전기</button>
          </div>
        </div>

        <div class="form-group" id="fuelPriceGroup">
          <label for="fuelPrice">유류 단가 (원/L)</label>
          <input type="number" id="fuelPrice" class="input-field" placeholder="예: 1650" min="0">
          <p class="input-hint" id="fuelPriceHint">전국 평균 참고: 휘발유 ~1,650원, 경유 ~1,500원, LPG ~1,050원</p>
        </div>

        <div class="form-group" id="elecPriceGroup" style="display:none">
          <label for="elecPrice">전기 충전 단가 (원/kWh)</label>
          <input type="number" id="elecPrice" class="input-field" placeholder="예: 350" min="0" value="350">
          <p class="input-hint">완속 ~250원, 급속 ~350원 (공용 충전기 기준)</p>
        </div>

        <div class="form-group">
          <label for="fuelEfficiency" id="efficiencyLabel">연비 (km/L)</label>
          <input type="number" id="fuelEfficiency" class="input-field" placeholder="예: 12" min="0" step="0.1">
        </div>

        <div class="form-group">
          <label for="monthlyKm">월 평균 주행거리 (km)</label>
          <input type="number" id="monthlyKm" class="input-field" placeholder="예: 1500" min="0" value="1500">
        </div>

        <div class="form-group">
          <label for="insuranceCost">연간 보험료 (원, 선택)</label>
          <input type="number" id="insuranceCost" class="input-field" placeholder="예: 800000" min="0">
        </div>

        <div class="form-group">
          <label for="taxCost">연간 자동차세 (원, 선택)</label>
          <input type="number" id="taxCost" class="input-field" placeholder="예: 300000" min="0">
        </div>

        <div class="form-group">
          <label for="etcCost">기타 월 비용 (원, 선택)</label>
          <input type="number" id="etcCost" class="input-field" placeholder="주차비, 세차비 등" min="0">
          <p class="input-hint">주차비, 세차비, 톨비 등 기타 월 고정비용</p>
        </div>

        <button class="btn-calc" onclick="calcMaintain()">계산하기</button>
        <div id="maintainResult" class="result-area"></div>
      </div>
    </div>
  </div>


  <script src="app.js"></script>
</body>
</html>
