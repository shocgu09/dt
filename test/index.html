  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <a href="/" class="back-btn">← 홈</a>
    <h1>🚗 운전 성향 테스트</h1>
    <button id="themeToggle" onclick="toggleTheme()" class="theme-btn">🌙</button>
  </header>

  <div class="test-wrap">
    <!-- 인트로 -->
    <div id="screen-intro" class="screen active">
      <div class="intro-card">
        <div class="intro-icon">🚗</div>
        <h2 class="intro-title">나는 어떤 드라이버?</h2>
        <p class="intro-desc">10가지 질문으로 알아보는<br>나의 운전 성향 테스트</p>
        <div class="type-preview">
          <span>🦅 칼날 매</span>
          <span>🐢 여유 거북</span>
          <span>🦊 눈치 여우</span>
          <span>🦁 돌진 사자</span>
          <span>🏅 정석 독수리</span>
          <span>⚡ 질주 호랑이</span>
        </div>
        <button class="btn-start" onclick="startTest()">테스트 시작하기</button>
        <p class="intro-time">약 2분 소요</p>
      </div>
    </div>

    <!-- 질문 -->
    <div id="screen-question" class="screen">
      <div class="progress-wrap">
        <div class="progress-info">
          <span id="qNum">1 / 10</span>
          <span id="qPercent">0%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      </div>
      <div class="question-card" id="questionCard">
        <p class="q-text" id="qText"></p>
        <div class="options" id="optionList"></div>
      </div>
    </div>

    <!-- 결과 -->
    <div id="screen-result" class="screen">
      <div class="result-card" id="resultCard">
        <div class="result-badge" id="resultBadge"></div>
        <div class="result-emoji" id="resultEmoji"></div>
        <div class="result-type" id="resultType"></div>
        <div class="result-title" id="resultTitle"></div>
        <p class="result-desc" id="resultDesc"></p>
        <div class="result-traits" id="resultTraits"></div>
        <div class="result-compat" id="resultCompat"></div>
        <div class="result-driving" id="resultDriving"></div>
      </div>
      <div class="result-actions">
        <button class="btn-share" onclick="shareResult()">🔗 결과 공유하기</button>
        <button class="btn-retry" onclick="restartTest()">🔄 다시 테스트하기</button>
      </div>
      <div class="other-types" id="otherTypes"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
